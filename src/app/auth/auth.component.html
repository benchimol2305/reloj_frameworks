<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isLoginMode ? 'Iniciar Sesión' : 'Registrarse' }}</h2>
    <p class="subtitle">Visualizador de Tiempo Alternativo v2026</p>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Ingresa tu usuario..." autocomplete="off">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••">
      </div>
      
      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
      
      <button type="submit" class="btn-primary">{{ isLoginMode ? 'Entrar' : 'Crear Cuenta' }}</button>
    </form>
    
    <div class="auth-toggle">
      <button (click)="toggleMode()">
        {{ isLoginMode ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia sesión' }}
      </button>
    </div>
  </div>
</div>
